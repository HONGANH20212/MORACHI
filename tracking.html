<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Đơn Hàng | MORACHI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .track-container { max-width: 600px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .track-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 20px; color: #111; }
        .track-input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        .track-input-group input { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; outline: none; }
        .track-input-group input:focus { border-color: #f57224; }
        .track-input-group button { padding: 0 25px; background: #111; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .track-input-group button:hover { background: #f57224; }

        .order-card { border: 1px solid #eee; border-radius: 6px; padding: 20px; margin-bottom: 15px; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #ddd; padding-bottom: 10px; margin-bottom: 10px; }
        .order-id { font-weight: bold; color: #f57224; font-size: 16px; }
        .order-date { font-size: 12px; color: #888; }
        
        .order-status { display: inline-block; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .status-pending { background: #fef5e7; color: #f39c12; }
        .status-delivering { background: #e8f8f0; color: #27ae60; }
        
        .spx-box { background: #e3f2fd; border: 1px dashed #3498db; padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        .spx-code { font-size: 18px; font-weight: bold; color: #2980b9; letter-spacing: 1px; margin-top: 5px; }
        .spx-link { background: #3498db; color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-size: 12px; font-weight: bold; transition: 0.2s; text-align: center; }
        .spx-link:hover { background: #2980b9; }

        .order-items { font-size: 13px; color: #555; line-height: 1.6; }
        .order-total { border-top: 1px dashed #ddd; padding-top: 10px; margin-top: 10px; font-weight: bold; text-align: right; font-size: 15px; color: #111; }
    </style>
</head>
<body style="background: #f4f4f4;">
    <header class="header">
        <div class="header-top container">
            <div class="logo">
                <a href="/">
                    <img src="images/icon-logo.png" alt="MORACHI" class="logo-icon">
                    <div class="logo-text">
                        <h1>MORACHI</h1>
                        <p>JAPAN BEAUTY</p>
                    </div>
                </a>
            </div>
            <div class="header-actions">
                <a href="/" style="color:white; text-decoration:none; font-weight:bold; font-size: 16px;"><i class="fas fa-home"></i> Trở về Trang chủ</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="track-container">
            <h2 class="track-title">Tra Cứu Đơn Hàng</h2>
            <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 25px;">Vui lòng nhập <b style="color:#111;">Số điện thoại</b> lúc đặt hàng để kiểm tra quá trình xử lý & xem mã vận đơn Shopee Xpress.</p>
            
            <div class="track-input-group">
                <input type="tel" id="search-phone" placeholder="Nhập số điện thoại của bạn..." onkeydown="if(event.key === 'Enter') fetchOrders()">
                <button onclick="fetchOrders()">TRA CỨU</button>
            </div>

            <div id="loading" style="display:none; text-align:center; padding:20px; color:#f57224;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
            <div id="results-container"></div>
        </div>
    </div>

    <script>
        async function fetchOrders() {
            const phone = document.getElementById('search-phone').value.trim();
            const resultsDiv = document.getElementById('results-container');
            const loadingDiv = document.getElementById('loading');
            
            if (!phone) {
                alert("Vui lòng nhập số điện thoại để tra cứu!");
                return;
            }

            resultsDiv.innerHTML = "";
            loadingDiv.style.display = "block";

            try {
                // Gọi API backend tìm đơn theo SĐT
                const response = await fetch(`/api/track?phone=${phone}`);
                const orders = await response.json();
                
                loadingDiv.style.display = "none";

                if (!response.ok || !orders || orders.length === 0) {
                    resultsDiv.innerHTML = `<div style="text-align:center; color:#e74c3c; font-weight:bold; padding: 20px; background: #fdedec; border-radius: 4px;"><i class="fas fa-exclamation-circle"></i> Không tìm thấy đơn hàng nào thuộc về số điện thoại này!</div>`;
                    return;
                }

                resultsDiv.innerHTML = orders.map(o => {
                    const dateStr = new Date(o.created_at).toLocaleString('vi-VN');
                    // Phân biệt màu sắc Trạng thái
                    const isDelivering = o.status.toLowerCase().includes("giao") || o.spx_tracking_code;
                    const statusClass = isDelivering ? 'status-delivering' : 'status-pending';
                    
                    let spxHtml = "";
                    // Nếu Admin đã nhập mã SPX thì mới in ô xanh này ra cho khách
                    if (o.spx_tracking_code) {
                        spxHtml = `
                            <div class="spx-box">
                                <div>
                                    <div style="font-size:12px; color:#555;">Đơn vị: <b>Shopee Xpress (SPX)</b></div>
                                    <div class="spx-code">${o.spx_tracking_code}</div>
                                </div>
                                <a href="https://spx.vn" target="_blank" class="spx-link"><i class="fas fa-search-location"></i> Kiểm tra trên SPX</a>
                            </div>
                        `;
                    }

                    const itemsHtml = o.items.map(i => `<div>• ${i.title} (${i.variant}) <b>x${i.quantity}</b></div>`).join('');

                    return `
                        <div class="order-card">
                            <div class="order-header">
                                <span class="order-id">Mã đơn: ${o.order_id || 'N/A'}</span>
                                <span class="order-date">${dateStr}</span>
                            </div>
                            <div class="order-status ${statusClass}"><i class="fas ${isDelivering ? 'fa-truck' : 'fa-box'}"></i> Trạng thái: ${o.status}</div>
                            
                            ${spxHtml}
                            
                            <div class="order-items">
                                <strong style="margin-bottom:5px; display:block;">Sản phẩm đã mua:</strong>
                                ${itemsHtml}
                            </div>
                            <div class="order-total">
                                Tổng cộng: <span style="color:#f57224;">${Number(o.total_amount).toLocaleString('vi-VN')} đ</span>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                loadingDiv.style.display = "none";
                resultsDiv.innerHTML = `<div style="text-align:center; color:red;">Lỗi kết nối máy chủ! Vui lòng thử lại sau.</div>`;
            }
        }
    </script>
</body>
</html>
