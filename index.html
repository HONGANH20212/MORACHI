<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Azure Shop - Catalogue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CỬA HÀNG TRỰC TUYẾN</h1>
        <p>Chuyên cung cấp sản phẩm chất lượng cao</p>
    </header>

    <main class="container">
        <div id="product-grid" class="grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/300" alt="Sản phẩm mẫu">
                <h3>Sản phẩm mẫu 1</h3>
                <p class="price">500.000 VNĐ</p>
                <button class="btn-detail">Xem chi tiết</button>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 My Azure Shop - Hoạt động trên Azure Static Web Apps</p>
    </footer>
</body>
</html>
