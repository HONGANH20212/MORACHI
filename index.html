<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm | MORACHI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #111; --accent: #f57224; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        .detail-wrapper { 
            display: flex; gap: 40px; margin-top: 30px; background: white; 
            padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        /* Cột Trái: Ảnh */
        .detail-gallery { width: 450px; flex-shrink: 0; }
        .main-img-wrap { 
            border: 1px solid #eee; border-radius: 12px; overflow: hidden; 
            margin-bottom: 15px; background: #fff; display: flex; align-items: center; justify-content: center;
        }
        .main-img-wrap img { width: 100%; height: auto; transition: 0.3s; }
        .thumb-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumb-item { 
            width: 70px; height: 70px; border: 2px solid #eee; border-radius: 8px; 
            cursor: pointer; object-fit: contain; background: #fff; padding: 2px;
        }
        .thumb-item.active { border-color: var(--accent); }

        /* Cột Phải: Thông tin */
        .detail-info { flex: 1; }
        .info-brand { color: #2980b9; font-weight: bold; font-size: 16px; margin-bottom: 5px; text-transform: uppercase; }
        .info-title { font-size: 26px; font-weight: bold; margin: 0 0 15px 0; line-height: 1.3; }
        
        .rating-box { margin-bottom: 20px; font-size: 14px; color: #666; }
        .rating-box i { color: #f1c40f; }

        .flash-deal { 
            background: linear-gradient(90deg, #f57224, #ff9800); color: white; 
            padding: 12px 20px; border-radius: 8px; display: flex; justify-content: space-between; 
            align-items: center; margin-bottom: 20px; 
        }
        .deal-timer { font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 5px; }

        .price-area { background: #fafafa; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .price-now { font-size: 32px; font-weight: bold; color: var(--accent); }
        .price-old { text-decoration: line-through; color: #999; margin-left: 15px; font-size: 18px; }

        /* Biến thể & Trạng thái */
        .section-label { font-weight: bold; margin-bottom: 12px; display: block; color: #444; }
        .variant-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .variant-btn { 
            border: 1px solid #ddd; padding: 10px 20px; border-radius: 8px; 
            cursor: pointer; background: white; transition: 0.2s; font-weight: 500;
        }
        .variant-btn:hover { border-color: var(--accent); }
        .variant-btn.active { border-color: var(--accent); color: var(--accent); background: #fff5f0; box-shadow: 0 0 0 1px var(--accent); }

        .status-box { 
            padding: 15px; border-radius: 8px; margin-bottom: 25px; 
            border: 1px solid #eee; display: flex; flex-direction: column; gap: 5px;
        }
        .status-row { display: flex; align-items: center; gap: 8px; font-size: 15px; }
        .status-value { font-weight: bold; }
        .color-red { color: #e74c3c; }
        .color-green { color: #27ae60; }

        .buy-group { display: flex; gap: 15px; margin-top: 20px; }
        .btn-add { flex: 1; padding: 16px; border: 1.5px solid var(--accent); color: var(--accent); border-radius: 10px; font-weight: bold; background: white; cursor: pointer; }
        .btn-now { flex: 1; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media (max-width: 850px) {
            .detail-wrapper { flex-direction: column; }
            .detail-gallery { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header" style="background:#fff; border-bottom:1px solid #eee; padding: 15px 0;">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
             <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <img src="images/icon-logo.png" width="40" alt="Logo">
                <span style="font-weight:bold; font-size:20px; color:#111;">MORACHI</span>
             </a>
             <div class="header-right"><i class="fas fa-shopping-bag" style="font-size:20px;"></i></div>
        </div>
    </header>

    <div class="breadcrumb container" style="margin: 20px auto; color:#888; font-size:14px;">
        <p><a href="/" style="text-decoration:none; color:inherit;">Trang chủ</a> > <span id="bread-brand">...</span> > <span id="bread-title" style="color:var(--accent)">...</span></p>
    </div>

    <div class="container" id="detail-root">
        <!-- JS sẽ đổ dữ liệu vào đây -->
        <div style="text-align:center; padding: 100px;">Đang tải thông tin sản phẩm...</div>
    </div>

    <script>
        const API_BASE_URL = "/api";
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function init() {
            if (!productId) { window.location.href = "/"; return; }

            try {
                const res = await fetch(`${API_BASE_URL}/products`);
                const products = await res.json();
                const product = products.find(p => p.id === productId);

                if (!product) {
                    document.getElementById('detail-root').innerHTML = "<h2 style='text-align:center; padding:50px;'>Sản phẩm không tồn tại</h2>";
                    return;
                }

                renderProductDetail(product);
            } catch (err) {
                console.error(err);
                document.getElementById('detail-root').innerHTML = "<h2 style='text-align:center; padding:50px;'>Lỗi kết nối máy chủ</h2>";
            }
        }

        function renderProductDetail(product) {
            document.title = product.title + " | Morachi Japan Beauty";
            document.getElementById('bread-brand').innerText = product.brand;
            document.getElementById('bread-title').innerText = product.title;

            const variants = product.variants || [];
            const hasVariants = variants.length > 0;

            const detailHTML = `
                <div class="detail-wrapper">
                    <div class="detail-gallery">
                        <div class="main-img-wrap">
                            <img src="${product.thumbnail}" id="main-view-img">
                        </div>
                        <div class="thumb-list" id="gallery-thumbs">
                            <img src="${product.thumbnail}" class="thumb-item active" onclick="setMainImg('${product.thumbnail}', this)">
                            ${variants.filter(v => v.image).map(v => `
                                <img src="${v.image}" class="thumb-item" onclick="setMainImg('${v.image}', this)">
                            `).join('')}
                        </div>
                    </div>

                    <div class="detail-info">
                        <div class="info-brand">${product.brand}</div>
                        <h1 class="info-title">${product.title}</h1>
                        <div class="rating-box">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                            <span> | ${product.rating || '4.9'} | Đã bán ${product.sold_text || '1.2k'}</span>
                        </div>

                        <div class="flash-deal">
                            <span><i class="fas fa-bolt"></i> FLASH DEAL MỖI NGÀY</span>
                            <div class="deal-timer" id="countdown">02 : 14 : 43</div>
                        </div>

                        <div class="price-area">
                            <span class="price-now" id="display-price">${Number(product.current_price).toLocaleString()} đ</span>
                            ${product.old_price ? `<span class="price-old">${Number(product.old_price).toLocaleString()} đ</span>` : ''}
                        </div>

                        <div class="options-box">
                            <span class="section-label">Chọn phân loại:</span>
                            <div class="variant-grid">
                                ${hasVariants ? variants.map((v, i) => `
                                    <button class="variant-btn ${i === 0 ? 'active' : ''}" 
                                            onclick="selectVariant(${JSON.stringify(v).replace(/"/g, '&quot;')}, this)">
                                        ${v.name}
                                    </button>
                                `).join('') : '<button class="variant-btn active">Mặc định</button>'}
                            </div>
                        </div>

                        <div class="status-box" id="status-display">
                            <!-- Trạng thái kho hàng sẽ hiện ở đây -->
                        </div>

                        <div class="buy-group">
                            <button class="btn-add" onclick="alert('Đã thêm vào giỏ hàng!')"><i class="fas fa-cart-plus"></i> GIỎ HÀNG</button>
                            <button class="btn-now" onclick="alert('Chuyển đến thanh toán!')">MUA NGAY</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detail-root').innerHTML = detailHTML;

            // Hiển thị trạng thái của biến thể đầu tiên mặc định
            if (hasVariants) {
                updateStatus(variants[0]);
            } else {
                updateStatus({ status: 'instock', stock: 10 });
            }
        }

        function setMainImg(url, el) {
            document.getElementById('main-view-img').src = url;
            document.querySelectorAll('.thumb-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        function selectVariant(variant, el) {
            // Cập nhật giao diện nút
            document.querySelectorAll('.variant-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');

            // Cập nhật ảnh nếu biến thể có ảnh riêng
            if (variant.image) {
                const mainImg = document.getElementById('main-view-img');
                mainImg.src = variant.image;
                // Highlight thumb tương ứng nếu có
                const thumbs = document.querySelectorAll('.thumb-item');
                thumbs.forEach(t => {
                    t.classList.remove('active');
                    if(t.src === variant.image) t.classList.add('active');
                });
            }

            // Cập nhật giá nếu biến thể có giá riêng
            if (variant.price) {
                document.getElementById('display-price').innerText = Number(variant.price).toLocaleString() + ' đ';
            }

            // Cập nhật trạng thái kho/order
            updateStatus(variant);
        }

        function updateStatus(v) {
            const container = document.getElementById('status-display');
            let html = "";

            if (v.status === 'instock') {
                html = `
                    <div class="status-row">
                        <i class="fas fa-check-circle color-green"></i> 
                        Trạng thái: <span class="status-value color-green">Sẵn hàng tại kho</span>
                    </div>
                    <div class="status-row">
                        <i class="fas fa-boxes"></i> 
                        Số lượng còn lại: <span class="status-value">${v.stock || 0} sản phẩm</span>
                    </div>
                `;
            } else if (v.status === 'order') {
                html = `
                    <div class="status-row">
                        <i class="fas fa-clock color-red"></i> 
                        Trạng thái: <span class="status-value color-red">Hàng Order (NULL)</span>
                    </div>
                    <div class="status-row" style="margin-top:5px; background:#fff5f5; padding:8px; border-radius:5px;">
                        <i class="fas fa-truck-loading color-red"></i> 
                        Ngày dự kiến có hàng: <span class="status-value color-red">${v.date || 'Đang cập nhật'}</span>
                    </div>
                `;
            } else {
                html = `
                    <div class="status-row">
                        <i class="fas fa-times-circle color-red"></i> 
                        Trạng thái: <span class="status-value color-red">Hết hàng tạm thời</span>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        window.onload = init;
    </script>
</body>
</html>
