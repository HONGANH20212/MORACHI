<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morachi | Quản Trị Hệ Thống</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #111; --accent: #f57224; --bg: #f8f9fa; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; color: var(--text); }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: white; min-height: 100vh; padding: 20px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { font-size: 22px; border-bottom: 1px solid #444; padding-bottom: 20px; letter-spacing: 1px; }
        .menu-item { padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-top: 5px; }
        .menu-item:hover, .menu-item.active { background: var(--accent); }

        /* Main Content */
        .main { margin-left: 260px; flex: 1; padding: 40px; box-sizing: border-box; }
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-add { background: var(--accent); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(245, 114, 36, 0.3); }

        /* Table */
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #f0f0f0; color: #888; font-size: 14px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        .product-img-mini { width: 60px; height: 60px; object-fit: contain; border-radius: 6px; background: #f9f9f9; border: 1px solid #eee; }
        .actions { display: flex; gap: 15px; }
        .btn-icon { border: none; background: none; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .edit-btn { color: #3498db; }
        .delete-btn { color: #e74c3c; }
        .edit-btn:hover { color: #2980b9; }
        .delete-btn:hover { color: #c0392b; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 550px; padding: 35px; border-radius: 15px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #aaa; }
        
        form { display: grid; gap: 18px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        label { font-size: 14px; font-weight: 600; color: #555; }
        #save-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>MORACHI</h2>
        <div class="menu-item active"><i class="fas fa-box"></i> Sản phẩm</div>
        <div class="menu-item"><i class="fas fa-chart-line"></i> Báo cáo</div>
        <div class="menu-item"><i class="fas fa-cog"></i> Cấu hình</div>
    </div>

      <div class="header-main">
          <h1>Danh sách sản phẩm</h1>
          <div style="display: flex; gap: 15px; align-items: center;">
              <div class="search-box" style="position: relative;">
                  <input type="text" id="admin-search-input" placeholder="Tìm tên sản phẩm..." 
                        style="padding: 10px 15px 10px 35px; width: 250px; border-radius: 20px; border: 1px solid #ddd;">
                  <i class="fas fa-search" style="position: absolute; left: 12px; top: 12px; color: #aaa;"></i>
              </div>
              <button class="btn-add" onclick="openModal()"><i class="fas fa-plus"></i> Thêm mới</button>
          </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Thương hiệu</th>
                        <th>Giá hiện tại</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="admin-product-list">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Thêm sản phẩm mới</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" id="title" placeholder="VD: Sữa rửa mặt Senka" required>
                </div>
                <div class="form-group">
                    <label>Thương hiệu</label>
                    <input type="text" id="brand" placeholder="VD: Senka" required>
                </div>
                <div class="form-group">
                    <label>Giá hiện tại (VNĐ)</label>
                    <input type="number" id="current_price" placeholder="VD: 120000" required>
                </div>
                <div class="form-group">
                    <label>Giá cũ (nếu có)</label>
                    <input type="number" id="old_price" placeholder="VD: 150000">
                </div>
                <div class="form-group">
                    <label>Giảm giá (nhãn)</label>
                    <input type="text" id="discount" placeholder="VD: -20%">
                </div>
                <div class="form-group">
                    <label>Hình ảnh sản phẩm</label>
                    <input type="file" id="thumbnail_file" accept="image/*">
                </div>
                <button type="submit" id="save-btn">Xác nhận lưu</button>
            </form>
            <div id="message" style="margin-top:15px; text-align:center; font-weight:bold;"></div>
        </div>
    </div>

    <script src="/admin/admin.js"></script>
</body>
</html>
