<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin MORACHI</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    // Ép CMS khởi tạo bằng cấu hình nội bộ, không đọc file config.yml bên ngoài nữa
    window.CMS_MANUAL_INIT = true;
    
    function initAdmin() {
      if (window.CMS) {
        CMS.init({
          config: {
            backend: { name: "github", repo: "HONGANH20212/MORACHI", branch: "main" },
            media_folder: "images",
            public_folder: "images",
            collections: [
              {
                name: "products",
                label: "Sản Phẩm",
                folder: "products",
                create: true,
                fields: [
                  { label: "Tên", name: "title", widget: "string" },
                  { label: "Ảnh", name: "thumbnail", widget: "image" },
                  { label: "Giá", name: "current_price", widget: "string" }
                ]
              }
            ]
          }
        });
      } else {
        setTimeout(initAdmin, 100);
      }
    }
    initAdmin();
  </script>
</body>
</html>
